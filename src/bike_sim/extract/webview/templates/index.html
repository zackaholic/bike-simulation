<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bike Simulation — World Inspector</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
  #map.sidebar-open { right: 420px; }
  #toolbar {
    position: absolute; top: 10px; left: 60px; z-index: 1000;
    background: white; padding: 6px 12px; border-radius: 4px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.3); font: 12px/1.5 sans-serif;
    display: flex; gap: 12px; align-items: center;
  }
  #toolbar label { font-weight: 600; color: #333; }
  #toolbar select { font-size: 12px; }
  /* ── Layer panel ── */
  #layer-panel {
    position: absolute; top: 10px; right: 10px; z-index: 1000;
    background: white; border-radius: 6px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.3); font: 12px/1.5 sans-serif;
    width: 240px; max-height: calc(100vh - 20px);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #layer-panel.collapsed { width: auto; max-height: none; }
  #layer-panel.collapsed .lp-body,
  #layer-panel.collapsed .lp-tabs,
  #layer-panel.collapsed .lp-persistent { display: none; }
  #layer-panel-toggle {
    position: absolute; top: 10px; right: 10px; z-index: 1001;
    background: white; border: none; border-radius: 4px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.3); cursor: pointer;
    font-size: 16px; padding: 4px 8px; line-height: 1; display: none;
  }
  #layer-panel-toggle:hover { background: #eee; }
  .lp-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; border-bottom: 1px solid #ddd;
    font-weight: 600; color: #333;
  }
  .lp-header .lp-collapse { cursor: pointer; font-size: 16px; color: #888; border: none; background: none; }
  .lp-header .lp-collapse:hover { color: #333; }
  .lp-tabs {
    display: flex; border-bottom: 1px solid #ddd;
  }
  .lp-tabs button {
    flex: 1; border: none; background: #f5f5f5; padding: 5px 0;
    font-size: 11px; font-weight: 600; cursor: pointer; color: #666;
    border-bottom: 2px solid transparent;
  }
  .lp-tabs button:hover { background: #eaeaea; }
  .lp-tabs button.active { background: white; color: #333; border-bottom-color: #4363d8; }
  .lp-body {
    overflow-y: auto; flex: 1; min-height: 0;
  }
  .lp-tab-content { display: none; padding: 6px 10px; }
  .lp-tab-content.active { display: block; }
  .lp-tab-content label {
    display: block; padding: 3px 0; cursor: pointer; color: #333;
  }
  .lp-tab-content label:hover { background: #f0f4ff; margin: 0 -10px; padding: 3px 10px; }
  .lp-tab-content input[type="checkbox"] { margin-right: 6px; }
  .lp-persistent {
    border-top: 1px solid #ddd; padding: 6px 10px;
  }
  .lp-persistent label { cursor: pointer; color: #333; }
  .lp-persistent input[type="checkbox"] { margin-right: 6px; }
  #sidebar {
    position: absolute; top: 0; right: 0; width: 420px; height: 100%;
    background: #fafafa; border-left: 1px solid #ccc;
    overflow-y: auto; font: 13px/1.5 sans-serif; padding: 12px;
    box-sizing: border-box; display: none; z-index: 1001;
  }
  #sidebar.open { display: block; }
  #sidebar h3 { margin: 12px 0 4px; font-size: 14px; color: #333; border-bottom: 1px solid #ddd; padding-bottom: 2px; }
  #sidebar h3:first-child { margin-top: 0; }
  #sidebar .close-btn { float: right; cursor: pointer; font-size: 18px; color: #888; }
  #sidebar .close-btn:hover { color: #333; }
  #sidebar table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
  #sidebar td { padding: 2px 6px; border-bottom: 1px solid #eee; }
  #sidebar td:first-child { font-weight: 600; color: #555; white-space: nowrap; max-width: 240px; overflow: hidden; text-overflow: ellipsis; }
  #sidebar td:last-child { text-align: right; }
  #sidebar .empty { color: #999; font-style: italic; }
  #legend {
    position: absolute; bottom: 20px; left: 10px; z-index: 1000;
    background: rgba(255,255,255,0.9); padding: 8px 12px; border-radius: 4px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.3); font: 11px/1.4 sans-serif;
    max-width: 220px; display: none;
  }
  #legend.visible { display: block; }
  .legend-entry { margin-bottom: 6px; }
  .legend-entry:last-child { margin-bottom: 0; }
  .legend-label { font-weight: 600; color: #333; margin-bottom: 2px; }
  .legend-bar { height: 12px; border-radius: 2px; border: 1px solid #ccc; }
  .legend-range { display: flex; justify-content: space-between; color: #666; font-size: 10px; }
  #toolbar .nav-btn {
    background: #f0f0f0; border: 1px solid #ccc; border-radius: 3px;
    cursor: pointer; font-size: 14px; padding: 2px 8px; line-height: 1;
    color: #333; user-select: none;
  }
  #toolbar .nav-btn:hover { background: #e0e0e0; }
  #toolbar .nav-btn:active { background: #d0d0d0; }
  #toolbar .nav-btn:disabled { opacity: 0.3; cursor: default; }
  #version-flash { display: none; }

  /* ── Timeline panel ── */
  #timeline-toggle {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    z-index: 1001; background: white; border: 1px solid #ccc; border-bottom: none;
    border-radius: 6px 6px 0 0; cursor: pointer; font: 600 12px/1 sans-serif;
    padding: 5px 16px 4px; color: #555; user-select: none;
    transition: bottom 0.15s ease;
  }
  #timeline-toggle:hover { background: #f0f0f0; color: #333; }
  #timeline-toggle.panel-open { bottom: 250px; }
  #timeline-panel {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 1000;
    height: 0; background: #fafafa; border-top: 1px solid #ccc;
    display: flex; flex-direction: column; overflow: hidden;
    transition: height 0.15s ease;
  }
  #timeline-panel.open { height: 250px; }
  .tl-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 12px; border-bottom: 1px solid #ddd; flex-shrink: 0;
    font: 12px/1.5 sans-serif;
  }
  .tl-tabs { display: flex; gap: 0; }
  .tl-tabs button {
    border: none; background: #eee; padding: 4px 14px; font-size: 11px;
    font-weight: 600; cursor: pointer; color: #666;
    border-bottom: 2px solid transparent;
  }
  .tl-tabs button:first-child { border-radius: 4px 0 0 4px; }
  .tl-tabs button:last-child { border-radius: 0 4px 4px 0; }
  .tl-tabs button:hover { background: #e0e0e0; }
  .tl-tabs button.active { background: white; color: #333; border-bottom-color: #4363d8; }
  .tl-close { cursor: pointer; font-size: 16px; color: #888; border: none; background: none; }
  .tl-close:hover { color: #333; }
  .tl-body { flex: 1; min-height: 0; position: relative; padding: 4px 12px 8px; }
  .tl-chart-container { position: absolute; top: 4px; left: 12px; right: 12px; bottom: 8px; display: none; }
  .tl-chart-container.active { display: block; }
  .tl-empty { color: #999; font: italic 13px/2 sans-serif; text-align: center; padding-top: 40px; }
</style>
</head>
<body>
<div id="map"></div>
<div id="legend"></div>
<div id="toolbar">
  <button class="nav-btn" id="version-prev" title="Previous version (Left arrow)">&#9664;</button>
  <label>Version: <select id="version-select"></select></label>
  <button class="nav-btn" id="version-next" title="Next version (Right arrow)">&#9654;</button>
</div>
<div id="version-flash"></div>
<div id="layer-panel">
  <div class="lp-header">
    <span>Layers</span>
    <button class="lp-collapse" id="lp-collapse-btn" title="Collapse">&times;</button>
  </div>
  <div class="lp-tabs" id="lp-tabs"></div>
  <div class="lp-body" id="lp-body"></div>
  <div class="lp-persistent" id="lp-persistent"></div>
</div>
<button id="layer-panel-toggle" title="Show layers">&#9776;</button>
<div id="sidebar">
  <span class="close-btn" id="sidebar-close">&times;</span>
  <div id="sidebar-content"></div>
</div>
<button id="timeline-toggle">&#9650; Timeline</button>
<div id="timeline-panel">
  <div class="tl-header">
    <div class="tl-tabs" id="tl-tabs">
      <button class="active" data-tab="population">Population</button>
      <button data-tab="weather">Weather</button>
      <button data-tab="diversity">Diversity</button>
      <button data-tab="speciation">Speciation</button>
    </div>
    <button class="tl-close" id="tl-close" title="Close timeline">&times;</button>
  </div>
  <div class="tl-body" id="tl-body">
    <div class="tl-chart-container active" id="tl-population"><canvas id="chart-population"></canvas></div>
    <div class="tl-chart-container" id="tl-weather"><canvas id="chart-weather"></canvas></div>
    <div class="tl-chart-container" id="tl-diversity"><canvas id="chart-diversity"></canvas></div>
    <div class="tl-chart-container" id="tl-speciation"><canvas id="chart-speciation"></canvas></div>
  </div>
</div>
<script>
(function () {
  var worldExtent = {{ world_extent }};
  var maxZoom = {{ max_zoom }};
  var defaultVersion = {{ current_version }};

  // ── Coordinate mapping ─────────────────────────────────────
  // L.CRS.Simple transforms y' = -y, so positive lat values produce
  // negative pixel coords. The standard pattern: use negative latitudes.
  // Map bounds: lng [0, 256], lat [-256, 0].
  //   lat = 0   → top (north)   → pixel y = 0
  //   lat = -256 → bottom (south) → pixel y = 256
  // This makes Leaflet's tile grid align with our server (tms: true).
  var mapSize = 256;
  var scale = mapSize / worldExtent;  // map units per meter

  function metersToMap(x, y) {
    return L.latLng(y * scale - mapSize, x * scale);
  }
  function mapToMeters(latlng) {
    return { x: latlng.lng / scale, y: (latlng.lat + mapSize) / scale };
  }

  // ── URL hash state ─────────────────────────────────────────

  function parseHash() {
    var params = {};
    var hash = location.hash.replace(/^#/, "");
    if (!hash) return params;
    hash.split("&").forEach(function (part) {
      var kv = part.split("=");
      if (kv.length === 2) params[kv[0]] = kv[1];
    });
    return params;
  }

  function updateHash(params) {
    var parts = [];
    for (var k in params) {
      parts.push(k + "=" + params[k]);
    }
    history.replaceState(null, "", "#" + parts.join("&"));
  }

  var hashState = parseHash();
  var version = hashState.version !== undefined ? parseInt(hashState.version, 10) : defaultVersion;

  // ── Map setup ──────────────────────────────────────────────

  var bounds = L.latLngBounds(L.latLng(-mapSize, 0), L.latLng(0, mapSize));

  var map = L.map("map", {
    crs: L.CRS.Simple,
    minZoom: 0,
    maxZoom: maxZoom,
    maxBounds: bounds.pad(0.1)
  });

  // Custom panes so geology always renders below overlays.
  map.createPane("basePane").style.zIndex = 200;
  map.createPane("overlayPane").style.zIndex = 400;

  if (hashState.lat && hashState.lng && hashState.z) {
    map.setView(
      L.latLng(parseFloat(hashState.lat), parseFloat(hashState.lng)),
      parseInt(hashState.z, 10)
    );
  } else {
    map.fitBounds(bounds);
  }

  map.on("moveend", function () {
    var c = map.getCenter();
    var h = parseHash();
    h.version = version;
    h.z = map.getZoom();
    h.lat = c.lat.toFixed(2);
    h.lng = c.lng.toFixed(2);
    updateHash(h);
  });

  // ── Sidebar ────────────────────────────────────────────────

  var sidebar = document.getElementById("sidebar");
  var sidebarContent = document.getElementById("sidebar-content");
  var mapEl = document.getElementById("map");
  var clickMarker = null;
  var selectedPoint = null;  // {latlng, meters: {x, y}} — persists across version changes

  function openSidebar(html) {
    sidebarContent.innerHTML = html;
    sidebar.classList.add("open");
    mapEl.classList.add("sidebar-open");
    map.invalidateSize();
  }

  function closeSidebar() {
    sidebar.classList.remove("open");
    mapEl.classList.remove("sidebar-open");
    map.invalidateSize();
    if (clickMarker) { map.removeLayer(clickMarker); clickMarker = null; }
    selectedPoint = null;
  }

  document.getElementById("sidebar-close").addEventListener("click", closeSidebar);

  function formatValue(v) {
    if (typeof v === "number") return v.toFixed(4);
    return String(v);
  }

  function renderPointData(data) {
    var html = "";
    html += "<h3>Location</h3>";
    html += "<table><tr><td>x</td><td>" + data.x.toFixed(1) + " m</td></tr>";
    html += "<tr><td>y</td><td>" + data.y.toFixed(1) + " m</td></tr></table>";

    var rasters = data.rasters || {};
    var byTier = {};
    for (var key in rasters) {
      var parts = key.split("/");
      var tier = parts[0], layer = parts.slice(1).join("/");
      // Skip seed bank layers in the sidebar — they're internal simulation state.
      if (layer.match(/^seed_bank/)) continue;
      if (!byTier[tier]) byTier[tier] = [];
      byTier[tier].push({ layer: layer, value: rasters[key] });
    }
    for (var t in byTier) {
      html += "<h3>" + t.replace(/_/g, " ") + "</h3><table>";
      byTier[t].forEach(function (r) {
        html += "<tr><td>" + r.layer + "</td><td>" + formatValue(r.value) + "</td></tr>";
      });
      html += "</table>";
    }

    html += "<h3>Species</h3>";
    var species = data.species || [];
    if (species.length === 0) {
      html += '<p class="empty">No species with density &gt; 0</p>';
    } else {
      html += "<table>";
      species.forEach(function (s) {
        html += "<tr><td>" + s.species_id + "</td><td>" + formatValue(s.density) + "</td></tr>";
      });
      html += "</table>";
    }

    html += "<h3>Individuals</h3>";
    var individuals = data.individuals || [];
    if (individuals.length === 0) {
      html += '<p class="empty">None nearby</p>';
    } else {
      html += "<table>";
      individuals.forEach(function (ind) {
        html += "<tr><td>" + ind.individual_id + "</td><td>" + ind.species_id + "</td></tr>";
      });
      html += "</table>";
    }

    html += "<h3>Events</h3>";
    var events = data.events || [];
    if (events.length === 0) {
      html += '<p class="empty">None nearby</p>';
    } else {
      html += "<table>";
      events.forEach(function (ev) {
        html += "<tr><td>" + ev.event_type + "</td><td>yr " + formatValue(ev.year) + "</td></tr>";
      });
      html += "</table>";
    }

    return html;
  }

  // Click handler: convert map coords to meters for the API.
  map.on("click", function (e) {
    var m = mapToMeters(e.latlng);
    selectPoint(e.latlng, m);
  });

  function selectPoint(latlng, meters) {
    selectedPoint = { latlng: latlng, meters: meters };

    if (clickMarker) { map.removeLayer(clickMarker); }
    clickMarker = L.circleMarker(latlng, { radius: 6, color: "#ff3333", weight: 2 }).addTo(map);

    fetch("/api/world/" + version + "/point?x=" + meters.x + "&y=" + meters.y)
      .then(function (r) { return r.json(); })
      .then(function (data) { openSidebar(renderPointData(data)); });
  }

  function refreshSelectedPoint() {
    if (selectedPoint) {
      selectPoint(selectedPoint.latlng, selectedPoint.meters);
    }
  }

  // ── Individual markers ─────────────────────────────────────

  var individualLayer = L.layerGroup().addTo(map);
  var speciesColors = [
    "#e6194b", "#3cb44b", "#ffe119", "#4363d8", "#f58231",
    "#911eb4", "#42d4f4", "#f032e6", "#bfef45", "#fabed4",
    "#469990", "#dcbeff"
  ];
  var speciesColorMap = {};
  var colorIndex = 0;

  function getSpeciesColor(speciesId) {
    if (!speciesColorMap[speciesId]) {
      speciesColorMap[speciesId] = speciesColors[colorIndex % speciesColors.length];
      colorIndex++;
    }
    return speciesColorMap[speciesId];
  }

  function renderIndividualDetail(data) {
    var html = "<h3>Individual: " + data.individual_id + "</h3><table>";
    html += "<tr><td>Species</td><td>" + data.species_id + "</td></tr>";
    html += "<tr><td>Position</td><td>" + data.x.toFixed(1) + ", " + data.y.toFixed(1) + "</td></tr>";
    html += "<tr><td>Appeared</td><td>yr " + data.appeared_year.toFixed(0) + "</td></tr>";
    html += "<tr><td>Age</td><td>" + data.age.toFixed(0) + " years</td></tr>";
    html += "<tr><td>Status</td><td>" + (data.alive ? "alive" : "dead (yr " + (data.died_year || "?") + ")") + "</td></tr>";
    html += "</table>";

    if (data.species_genome) {
      html += "<h3>Species genome</h3><table>";
      for (var trait in data.species_genome) {
        html += "<tr><td>" + trait + "</td><td>" + formatValue(data.species_genome[trait]) + "</td></tr>";
      }
      html += "</table>";
    }
    return html;
  }

  function loadIndividuals() {
    var b = map.getBounds();
    var sw = mapToMeters(b.getSouthWest());
    var ne = mapToMeters(b.getNorthEast());
    var x_min = Math.max(0, sw.x);
    var y_min = Math.max(0, sw.y);
    var x_max = Math.min(worldExtent, ne.x);
    var y_max = Math.min(worldExtent, ne.y);

    fetch("/api/world/" + version + "/individuals?x_min=" + x_min + "&y_min=" + y_min +
          "&x_max=" + x_max + "&y_max=" + y_max)
      .then(function (r) { return r.json(); })
      .then(function (individuals) {
        individualLayer.clearLayers();
        individuals.forEach(function (ind) {
          var color = getSpeciesColor(ind.species_id);
          var marker = L.circleMarker(metersToMap(ind.x, ind.y), {
            radius: 5, color: color, fillColor: color, fillOpacity: 0.7, weight: 1
          });
          marker.bindTooltip(ind.individual_id, { direction: "top", offset: [0, -6] });
          marker.on("click", function (e) {
            L.DomEvent.stopPropagation(e);
            fetch("/api/world/" + version + "/individual/" + ind.individual_id)
              .then(function (r) { return r.json(); })
              .then(function (detail) { openSidebar(renderIndividualDetail(detail)); });
          });
          individualLayer.addLayer(marker);
        });
      });
  }

  map.on("moveend", loadIndividuals);
  loadIndividuals();

  // ── Layer controls ─────────────────────────────────────────

  var activeTileLayers = {};  // key → L.tileLayer

  function makeTileLayer(tier, layer, isOverlay) {
    return L.tileLayer(
      "/api/world/" + version + "/tiles/" + tier + "/" + layer + "/{z}/{x}/{y}.png",
      { tileSize: 256, bounds: bounds, minZoom: 0, maxZoom: maxZoom, noWrap: true,
        opacity: isOverlay ? 0.6 : 1.0, pane: isOverlay ? "overlayPane" : "basePane" }
    );
  }

  // ── Legend ──────────────────────────────────────────────────

  var legendEl = document.getElementById("legend");
  var legendEntries = {};  // layer key → DOM element

  // CSS gradients matching the LUTs in tiles.py.
  var colormapGradients = {
    terrain: "linear-gradient(to right, rgb(20,60,120), rgb(50,120,60), rgb(80,160,50), rgb(160,140,80), rgb(180,160,140), rgb(240,240,240))",
    viridis: "linear-gradient(to right, rgb(68,1,84), rgb(59,82,139), rgb(33,145,140), rgb(94,201,98), rgb(253,231,37))",
    blues: "linear-gradient(to right, rgb(240,240,255), rgb(100,140,210), rgb(10,30,100))",
    greens: "linear-gradient(to right, rgb(240,250,230), rgb(80,180,60), rgb(10,80,20))"
  };

  function addLegendEntry(key, tier, layer) {
    if (legendEntries[key]) return;  // already showing
    fetch("/api/world/" + version + "/layer_info/" + tier + "/" + layer)
      .then(function (r) { return r.json(); })
      .then(function (info) {
        if (info.colormap === "categorical") return;  // skip categorical
        var grad = colormapGradients[info.colormap] || colormapGradients.viridis;
        var div = document.createElement("div");
        div.className = "legend-entry";
        div.innerHTML =
          '<div class="legend-label">' + layer.replace(/_/g, " ") + (info.units ? ' <span style="font-weight:normal;color:#888">(' + info.units + ')</span>' : '') + '</div>' +
          '<div class="legend-bar" style="background:' + grad + '"></div>' +
          '<div class="legend-range"><span>' + info.vmin.toFixed(1) + '</span><span>' + info.vmax.toFixed(1) + '</span></div>';
        legendEl.appendChild(div);
        legendEntries[key] = div;
        legendEl.classList.add("visible");
      });
  }

  function removeLegendEntry(key) {
    if (legendEntries[key]) {
      legendEl.removeChild(legendEntries[key]);
      delete legendEntries[key];
      if (Object.keys(legendEntries).length === 0) {
        legendEl.classList.remove("visible");
      }
    }
  }

  function clearAllLegends() {
    for (var key in legendEntries) {
      legendEl.removeChild(legendEntries[key]);
    }
    legendEntries = {};
    legendEl.classList.remove("visible");
  }

  // ── Layer panel ────────────────────────────────────────────

  var layerPanel = document.getElementById("layer-panel");
  var lpTabsEl = document.getElementById("lp-tabs");
  var lpBodyEl = document.getElementById("lp-body");
  var lpPersistent = document.getElementById("lp-persistent");
  var lpCollapseBtn = document.getElementById("lp-collapse-btn");
  var lpToggleBtn = document.getElementById("layer-panel-toggle");

  lpCollapseBtn.addEventListener("click", function () {
    layerPanel.style.display = "none";
    lpToggleBtn.style.display = "block";
  });

  lpToggleBtn.addEventListener("click", function () {
    layerPanel.style.display = "flex";
    lpToggleBtn.style.display = "none";
  });

  // Categorize a layer into a tab (or null to skip).
  function categorizeLayer(tier, name) {
    if (tier === "geology") return "Terrain";
    if (tier === "climate_hydrology") return "Climate";
    if (tier === "ride") return "Ride";
    if (tier === "ecology") {
      if (name.match(/^species_.*_density$/)) return "Species";
      if (name.match(/^seed_bank/)) return null;    // skip
      if (name.match(/^biomass_age_/)) return null;  // skip
      return "Ecology";
    }
    return "Ecology";  // fallback
  }

  // Display name for a layer.
  function layerDisplayName(tier, name) {
    if (name.match(/^species_.*_density$/)) {
      return name.replace(/^species_/, "").replace(/_density$/, "").replace(/_/g, " ");
    }
    return name.replace(/_/g, " ");
  }

  var tabOrder = ["Terrain", "Climate", "Ecology", "Species", "Ride"];
  var activeTab = tabOrder[0];  // Track which tab is selected

  // Track which layer keys the user has toggled on, so flipbook preserves them.
  var userLayerSelection = null;  // null = use defaults; Set = explicit choices

  function buildLayers() {
    // Snapshot current selections before clearing, if any layers are active.
    if (Object.keys(activeTileLayers).length > 0) {
      userLayerSelection = new Set(Object.keys(activeTileLayers));
    }

    // Remove all existing tile layers from the map.
    for (var key in activeTileLayers) {
      map.removeLayer(activeTileLayers[key]);
    }
    activeTileLayers = {};
    clearAllLegends();

    // Clear panel contents.
    lpTabsEl.innerHTML = "";
    lpBodyEl.innerHTML = "";
    lpPersistent.innerHTML = "";

    fetch("/api/world/" + version + "/metadata")
      .then(function (r) { return r.json(); })
      .then(function (meta) {
        // Bucket layers into tabs.
        var tabs = {};
        tabOrder.forEach(function (t) { tabs[t] = []; });

        var layers = meta.layers;
        for (var tier in layers) {
          var names = layers[tier];
          for (var i = 0; i < names.length; i++) {
            var name = names[i];
            var tab = categorizeLayer(tier, name);
            if (!tab) continue;
            tabs[tab].push({ tier: tier, name: name, key: tier + "/" + name });
          }
        }

        // Sort species by display name.
        tabs.Species.sort(function (a, b) {
          return layerDisplayName(a.tier, a.name).localeCompare(layerDisplayName(b.tier, b.name));
        });

        // Build tab buttons and content panes.
        var tabContents = {};
        tabOrder.forEach(function (tabName, idx) {
          // Tab button.
          var btn = document.createElement("button");
          btn.textContent = tabName;
          btn.dataset.tab = tabName;
          if (tabName === activeTab) btn.className = "active";
          btn.addEventListener("click", function () {
            lpTabsEl.querySelectorAll("button").forEach(function (b) { b.classList.remove("active"); });
            btn.classList.add("active");
            activeTab = tabName;
            lpBodyEl.querySelectorAll(".lp-tab-content").forEach(function (c) { c.classList.remove("active"); });
            tabContents[tabName].classList.add("active");
          });
          lpTabsEl.appendChild(btn);

          // Content pane.
          var pane = document.createElement("div");
          pane.className = "lp-tab-content" + (tabName === activeTab ? " active" : "");
          tabContents[tabName] = pane;

          var items = tabs[tabName];
          if (items.length === 0) {
            var em = document.createElement("em");
            em.style.color = "#999";
            em.textContent = "No layers";
            pane.appendChild(em);
          } else {
            items.forEach(function (item) {
              var lbl = document.createElement("label");
              var cb = document.createElement("input");
              cb.type = "checkbox";
              cb.dataset.key = item.key;
              cb.dataset.tier = item.tier;
              cb.dataset.layer = item.name;

              // Restore previous selection, or default to heightmap.
              var shouldBeOn = userLayerSelection
                ? userLayerSelection.has(item.key)
                : (item.name === "heightmap");
              if (shouldBeOn) {
                cb.checked = true;
                var tl = makeTileLayer(item.tier, item.name, item.tier !== "geology");
                tl.addTo(map);
                activeTileLayers[item.key] = tl;
                addLegendEntry(item.key, item.tier, item.name);
              }

              cb.addEventListener("change", function () {
                var k = this.dataset.key;
                var t = this.dataset.tier;
                var ln = this.dataset.layer;
                if (this.checked) {
                  var layer = makeTileLayer(t, ln, t !== "geology");
                  layer.addTo(map);
                  activeTileLayers[k] = layer;
                  addLegendEntry(k, t, ln);
                } else {
                  if (activeTileLayers[k]) {
                    map.removeLayer(activeTileLayers[k]);
                    delete activeTileLayers[k];
                  }
                  removeLegendEntry(k);
                }
              });

              lbl.appendChild(cb);
              lbl.appendChild(document.createTextNode(layerDisplayName(item.tier, item.name)));
              pane.appendChild(lbl);
            });
          }

          lpBodyEl.appendChild(pane);
        });

        // Persistent section: individuals toggle.
        var indLabel = document.createElement("label");
        var indCb = document.createElement("input");
        indCb.type = "checkbox";
        indCb.checked = map.hasLayer(individualLayer);
        indCb.addEventListener("change", function () {
          if (this.checked) {

          } else {
            map.removeLayer(individualLayer);
          }
        });
        indLabel.appendChild(indCb);
        indLabel.appendChild(document.createTextNode("Individuals"));
        lpPersistent.appendChild(indLabel);
      });
  }

  buildLayers();

  // ── Version picker ─────────────────────────────────────────

  versionSelect.addEventListener("change", function () {

  window.addEventListener("hashchange", function () {

  // ── Flipbook navigation (prev/next version) ───────────────

  var prevBtn = document.getElementById("version-prev");

  var flashTimer = null;

  function flashVersion() {
    var opt = versionSelect.options[versionSelect.selectedIndex];
    flashEl.textContent = opt ? opt.textContent : "v" + version;
    flashEl.classList.add("show");
    clearTimeout(flashTimer);
    flashTimer = setTimeout(function () { flashEl.classList.remove("show"); }, 900);
  }

  function stepVersion(delta) {
    var opts = versionSelect.options;
    if (opts.length === 0) return;
    var idx = versionSelect.selectedIndex + delta;
    if (idx < 0 || idx >= opts.length) return;
    versionSelect.selectedIndex = idx;
    versionSelect.dispatchEvent(new Event("change"));
    flashVersion();
  }

  function updateNavButtons() {
    var opts = versionSelect.options;
    prevBtn.disabled = (opts.length === 0 || versionSelect.selectedIndex <= 0);
    nextBtn.disabled = (opts.length === 0 || versionSelect.selectedIndex >= opts.length - 1);
  }

  prevBtn.addEventListener("click", function () { stepVersion(-1); });
  nextBtn.addEventListener("click", function () { stepVersion(1); });

    if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
    if (e.key === "ArrowLeft") { e.preventDefault(); stepVersion(-1); }

  // Ancestor color palette: 6 ancestors get distinct base hues
  var ancestorHues = [0, 120, 210, 45, 280, 170];  // red, green, blue, orange, purple, teal
  function ancestorColor(ancestorIdx, alpha) {
    var h = ancestorHues[ancestorIdx % ancestorHues.length];
    return "hsla(" + h + ", 70%, 45%, " + (alpha || 1) + ")";
  }
  function ancestorColorLight(ancestorIdx, alpha) {
    var h = ancestorHues[ancestorIdx % ancestorHues.length];

  // Get current version's year from the dropdown text
  function currentVersionYear() {
    var opt = versionSelect.options[versionSelect.selectedIndex];

  // Build annotation config for snapshot lines + current version

      annotations["snap_" + i] = {

  // Update just the current-version annotation on all charts
  function updateCurrentVersionMarker() {
    var curYear = currentVersionYear();
    [chartPopulation, chartWeather, chartDiversity, chartSpeciation].forEach(function (chart) {
      if (!chart) return;
      var ann = chart.options.plugins.annotation.annotations;
      if (curYear !== null) {
        ann.current = {
          type: "line",

  // Click on chart near a snapshot: jump to that version
  function handleChartClick(event, chart) {
    var xScale = chart.scales.x;
    if (!xScale) return;
    var rect = chart.canvas.getBoundingClientRect();
    var clickX = event.clientX || (event.native && event.native.clientX);
    if (clickX === undefined) return;
    var canvasX = clickX - rect.left;
    var clickYear = xScale.getValueForPixel(canvasX);

    // Find nearest snapshot within 3% of x-range
    var range = xScale.max - xScale.min;
    var threshold = range * 0.03;
    var bestSnap = null;
    var bestDist = Infinity;
    tlSnapshots.forEach(function (snap) {
      var d = Math.abs(snap.year - clickYear);
      if (d < threshold && d < bestDist) {
        bestDist = d;
        bestSnap = snap;
      }
    });
    if (bestSnap) {
      // Find the version in the dropdown and select it
      var opts = versionSelect.options;
      for (var i = 0; i < opts.length; i++) {
        if (parseInt(opts[i].value, 10) === bestSnap.version_id) {
          versionSelect.selectedIndex = i;
          versionSelect.dispatchEvent(new Event("change"));
          flashVersion();
          break;
        }
      }
    }
  }

  function buildPopulationChart(data) {
    if (!data || !data.years || data.years.length === 0) {

    // Group species by ancestor
    var speciesIds = Object.keys(data.species || {});
    if (speciesIds.length === 0) { showEmpty("tl-population"); return; }

    // Parse ancestor from species_id: "anc_02_valley_tree" -> ancestor index 2
    function getAncestor(sid) {
      var m = sid.match(/^anc_(\d+)/);
      return m ? parseInt(m[1], 10) : 0;
    }

    // Build ancestor groups
    var ancestorGroups = {};
    speciesIds.forEach(function (sid) {
      var anc = getAncestor(sid);
      if (!ancestorGroups[anc]) ancestorGroups[anc] = [];
      ancestorGroups[anc].push(sid);
    });

    // One thick line per ancestor (summed densities)
    var datasets = [];
    var ancestorKeys = Object.keys(ancestorGroups).sort(function (a, b) { return a - b; });
    ancestorKeys.forEach(function (ancIdx) {
      var sids = ancestorGroups[ancIdx];
      var summed = data.years.map(function (_, yi) {
        var sum = 0;
        sids.forEach(function (sid) { sum += (data.species[sid][yi] || 0); });
        return sum;
      });
      datasets.push({
        label: "Ancestor " + ancIdx + " (" + sids.length + " spp)",
        data: summed,
        borderColor: ancestorColor(parseInt(ancIdx)),
        backgroundColor: ancestorColorLight(parseInt(ancIdx), 0.1),
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.3,
        fill: false

          annotation: { annotations: makeAnnotations() },
          tooltip: { callbacks: { label: function (ctx) { return ctx.dataset.label + ": " + ctx.parsed.y.toFixed(2); } } }
        },
        scales: {
          x: { title: { display: true, text: "Year", font: { size: 11 } }, ticks: { font: { size: 10 } } },
          y: { title: { display: true, text: "Total density", font: { size: 11 } }, ticks: { font: { size: 10 } }, beginAtZero: true }
        },
        onClick: function (event) { handleChartClick(event, chartPopulation); }

  }

  function buildSpeciationChart(data) {
    if (!data || !data.species || data.species.length === 0) {
      showEmpty("tl-speciation", "No speciation data");
      return;
    }

    var species = data.species;
    var maxYear = data.max_year || 1000;

    // Assign y-position: group by ancestor, then order by appeared_year
    // within each ancestor group
    var byAncestor = {};
    species.forEach(function (sp) {
      var a = sp.ancestor;
      if (!byAncestor[a]) byAncestor[a] = [];
      byAncestor[a].push(sp);
    });

    var ancestorKeys = Object.keys(byAncestor).sort(function (a, b) { return a - b; });
    var yPos = {};  // species_id -> y position
    var yCounter = 0;
    var ancestorBands = [];  // {ancestor, yStart, yEnd} for background shading

    ancestorKeys.forEach(function (ancIdx) {
      var group = byAncestor[ancIdx];
      group.sort(function (a, b) { return a.appeared_year - b.appeared_year; });
      var yStart = yCounter;
      group.forEach(function (sp) {
        yPos[sp.species_id] = yCounter;
        yCounter++;
      });
      ancestorBands.push({ ancestor: parseInt(ancIdx), yStart: yStart, yEnd: yCounter - 1 });
    });

    var totalSpecies = yCounter;

    // Build datasets: one line segment per species (appeared -> extinct/maxYear)
    // and vertical branch lines connecting parent to child
    var datasets = [];

    // Species lifespan lines — one dataset per ancestor for legend grouping
    ancestorKeys.forEach(function (ancIdx) {
      var group = byAncestor[ancIdx];
      var color = ancestorColor(parseInt(ancIdx));

      // Each species is a segment: [{x: appeared, y: yPos}, {x: end, y: yPos}]
      // Use individual datasets per species for proper line rendering
      group.forEach(function (sp, i) {
        var endYear = sp.extinct_year !== null ? sp.extinct_year : maxYear;
        var y = yPos[sp.species_id];

        // Compute max density for this species to scale line width
        var maxDensity = 0;
        if (sp.population) {
          sp.population.forEach(function (p) {
            if (p.density > maxDensity) maxDensity = p.density;
          });
        }
        var lineWidth = maxDensity > 0 ? Math.max(1.5, Math.min(6, maxDensity / 5000)) : 1.5;

        // Display name: strip ancestor prefix for readability
        var displayName = sp.species_id.replace(/^anc_\d+_/, "");
        if (displayName === sp.species_id) displayName = sp.species_id;

        datasets.push({
          label: i === 0 ? "Ancestor " + ancIdx + " (" + group.length + " spp)" : "",
          data: [{ x: sp.appeared_year, y: y }, { x: endYear, y: y }],
          borderColor: sp.extinct_year !== null ? ancestorColorLight(parseInt(ancIdx), 0.5) : color,
          borderWidth: lineWidth,
          pointRadius: [3, 0],  // dot at origin, nothing at end
          pointBackgroundColor: color,
          pointBorderColor: color,
          showLine: true,
          fill: false,
          _speciesId: sp.species_id,
          _displayName: displayName,
          _ancestor: parseInt(ancIdx),
          _extinct: sp.extinct_year !== null
        });
      });
    });

    // Branch lines: vertical dashed lines from parent's y to child's y at child's appeared_year
    species.forEach(function (sp) {
      if (sp.parent_id && yPos[sp.parent_id] !== undefined) {
        var parentY = yPos[sp.parent_id];
        var childY = yPos[sp.species_id];
        datasets.push({
          label: "",
          data: [{ x: sp.appeared_year, y: parentY }, { x: sp.appeared_year, y: childY }],
          borderColor: "rgba(150, 150, 150, 0.4)",
          borderWidth: 1,
          borderDash: [3, 3],
          pointRadius: 0,
          showLine: true,
          fill: false
        });
      }
    });

    // Build y-axis labels (species names, abbreviated)
    var yLabels = new Array(totalSpecies);
    species.forEach(function (sp) {
      var y = yPos[sp.species_id];
      var name = sp.species_id.replace(/^anc_\d+_/, "").substring(0, 20);
      yLabels[y] = name;
    });

    var ctx = document.getElementById("chart-speciation").getContext("2d");
    chartSpeciation = new Chart(ctx, {
      type: "scatter",
      data: { datasets: datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: {
          mode: "nearest",
          intersect: false,
          axis: "y"
        },
        plugins: {
          legend: {
            position: "right",
            labels: {
              boxWidth: 12,
              font: { size: 10 },
              filter: function (item) { return item.text !== ""; }
            }
          },
          annotation: { annotations: makeAnnotations() },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                var ds = ctx.dataset;
                if (!ds._speciesId) return "";
                var status = ds._extinct ? " (extinct)" : " (extant)";
                return ds._speciesId + status;
              }
            }
          }
        },
        scales: {
          x: {
            type: "linear",
            title: { display: true, text: "Year", font: { size: 11 } },
            ticks: { font: { size: 10 } },
            min: 0,
            max: maxYear
          },
          y: {
            type: "linear",
            reverse: false,
            title: { display: false },
            min: -0.5,
            max: totalSpecies - 0.5,
            ticks: {
              font: { size: 9 },
              stepSize: 1,
              callback: function (value) {
                var idx = Math.round(value);
                return yLabels[idx] || "";
              }
            },
            grid: { display: false }
          }
        },
        onClick: function (event) { handleChartClick(event, chartSpeciation); }
      }
    });
  }

  function loadTimelineData() {
    // Fetch all timeline data in parallel
    var fetches = [
      fetch("/api/timeline/species").then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; }),
      fetch("/api/timeline/weather").then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; }),
      fetch("/api/timeline/diversity").then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; }),
      fetch("/api/timeline/snapshots").then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; }),
      fetch("/api/timeline/speciation").then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; })
    ];

    Promise.all(fetches).then(function (results) {
      tlSpeciesData = results[0];
      tlWeatherData = results[1];
      tlDiversityData = results[2];
      tlSnapshots = results[3] || [];
      tlSpeciationData = results[4];

      buildPopulationChart(tlSpeciesData);
      buildWeatherChart(tlWeatherData);
      buildDiversityChart(tlDiversityData);
      buildSpeciationChart(tlSpeciationData);
      tlDataLoaded = true;
    });
  }

  // Hook into version changes to update the current-version marker
  versionSelect.addEventListener("change", function () {
    if (tlDataLoaded) {
      // Small delay to let version variable update first
      setTimeout(updateCurrentVersionMarker, 50);
    }
  });
})();
</script>
</body>
</html>
