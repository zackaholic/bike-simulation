<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bike Simulation — World Inspector</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  /* Map sits to the left; the right edge is reserved for the layer panel,
     and widens further when the inspector card opens beside it. */
  #map { position: absolute; top: 0; left: 0; right: 260px; bottom: 0; }
  #map.sidebar-open { right: 510px; }
  #toolbar {
    position: absolute; top: 10px; left: 60px; z-index: 1000;
    background: white; padding: 6px 12px; border-radius: 4px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.3); font: 12px/1.5 sans-serif;
    display: flex; gap: 12px; align-items: center;
  }
  #toolbar label { font-weight: 600; color: #333; }
  #toolbar select { font-size: 12px; }
  /* ── Layer panel ── */
  #layer-panel {
    position: absolute; top: 10px; right: 10px; z-index: 1000;
    background: white; border-radius: 6px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.3); font: 12px/1.5 sans-serif;
    width: 240px; max-height: calc(100vh - 20px);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #layer-panel.collapsed { width: auto; max-height: none; }
  #layer-panel.collapsed .lp-body,
  #layer-panel.collapsed .lp-tabs,
  #layer-panel.collapsed .lp-persistent { display: none; }
  #layer-panel-toggle {
    position: absolute; top: 10px; right: 10px; z-index: 1001;
    background: white; border: none; border-radius: 4px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.3); cursor: pointer;
    font-size: 16px; padding: 4px 8px; line-height: 1; display: none;
  }
  #layer-panel-toggle:hover { background: #eee; }
  .lp-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; border-bottom: 1px solid #ddd;
    font-weight: 600; color: #333;
  }
  .lp-header .lp-collapse { cursor: pointer; font-size: 16px; color: #888; border: none; background: none; }
  .lp-header .lp-collapse:hover { color: #333; }
  .lp-tabs {
    display: flex; border-bottom: 1px solid #ddd;
  }
  .lp-tabs button {
    flex: 1; border: none; background: #f5f5f5; padding: 5px 0;
    font-size: 11px; font-weight: 600; cursor: pointer; color: #666;
    border-bottom: 2px solid transparent;
  }
  .lp-tabs button:hover { background: #eaeaea; }
  .lp-tabs button.active { background: white; color: #333; border-bottom-color: #4363d8; }
  .lp-body {
    overflow-y: auto; flex: 1; min-height: 0;
  }
  .lp-tab-content { display: none; padding: 6px 10px; }
  .lp-tab-content.active { display: block; }
  .lp-tab-content label {
    display: block; padding: 3px 0; cursor: pointer; color: #333;
  }
  .lp-tab-content label:hover { background: #f0f4ff; margin: 0 -10px; padding: 3px 10px; }
  .lp-tab-content input[type="checkbox"] { margin-right: 6px; }
  .lp-persistent {
    border-top: 1px solid #ddd; padding: 6px 10px;
  }
  .lp-persistent label { cursor: pointer; color: #333; }
  .lp-persistent input[type="checkbox"] { margin-right: 6px; }
  /* Inspector: a compact card beside the layer panel (not a full-height bar),
     so it never covers the ride-profile panel at the bottom. */
  #sidebar {
    position: absolute; top: 10px; right: 260px; width: 240px;
    max-height: calc(100vh - 280px);
    background: #fff; border: 1px solid #ccc; border-radius: 6px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.3);
    overflow-y: auto; font: 13px/1.5 sans-serif; padding: 12px;
    box-sizing: border-box; display: none; z-index: 1001;
  }
  #sidebar.open { display: block; }
  #sidebar h3 { margin: 12px 0 4px; font-size: 14px; color: #333; border-bottom: 1px solid #ddd; padding-bottom: 2px; }
  #sidebar h3:first-child { margin-top: 0; }
  #sidebar .close-btn { float: right; cursor: pointer; font-size: 18px; color: #888; }
  #sidebar .close-btn:hover { color: #333; }
  #sidebar table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
  #sidebar td { padding: 2px 6px; border-bottom: 1px solid #eee; }
  #sidebar td:first-child { font-weight: 600; color: #555; white-space: nowrap; max-width: 240px; overflow: hidden; text-overflow: ellipsis; }
  #sidebar td:last-child { text-align: right; }
  #sidebar .empty { color: #999; font-style: italic; }
  #legend {
    position: absolute; bottom: 20px; left: 10px; z-index: 1000;
    background: rgba(255,255,255,0.9); padding: 8px 12px; border-radius: 4px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.3); font: 11px/1.4 sans-serif;
    max-width: 220px; display: none;
  }
  #legend.visible { display: block; }
  .legend-entry { margin-bottom: 6px; }
  .legend-entry:last-child { margin-bottom: 0; }
  .legend-label { font-weight: 600; color: #333; margin-bottom: 2px; }
  .legend-bar { height: 12px; border-radius: 2px; border: 1px solid #ccc; }
  .legend-range { display: flex; justify-content: space-between; color: #666; font-size: 10px; }
  #toolbar .nav-btn {
    background: #f0f0f0; border: 1px solid #ccc; border-radius: 3px;
    cursor: pointer; font-size: 14px; padding: 2px 8px; line-height: 1;
    color: #333; user-select: none;
  }
  #toolbar .nav-btn:hover { background: #e0e0e0; }
  #toolbar .nav-btn:active { background: #d0d0d0; }
  #toolbar .nav-btn:disabled { opacity: 0.3; cursor: default; }
  #version-flash { display: none; }

  /* ── Timeline panel ── */
  #timeline-toggle {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    z-index: 1001; background: white; border: 1px solid #ccc; border-bottom: none;
    border-radius: 6px 6px 0 0; cursor: pointer; font: 600 12px/1 sans-serif;
    padding: 5px 16px 4px; color: #555; user-select: none;
    transition: bottom 0.15s ease;
  }
  #timeline-toggle:hover { background: #f0f0f0; color: #333; }
  #timeline-toggle.panel-open { bottom: 250px; }
  #timeline-panel {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 1000;
    height: 0; background: #fafafa; border-top: 1px solid #ccc;
    display: flex; flex-direction: column; overflow: hidden;
    transition: height 0.15s ease;
  }
  #timeline-panel.open { height: 250px; }
  .tl-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 12px; border-bottom: 1px solid #ddd; flex-shrink: 0;
    font: 12px/1.5 sans-serif;
  }
  .tl-tabs { display: flex; gap: 0; }
  .tl-tabs button {
    border: none; background: #eee; padding: 4px 14px; font-size: 11px;
    font-weight: 600; cursor: pointer; color: #666;
    border-bottom: 2px solid transparent;
  }
  .tl-tabs button:first-child { border-radius: 4px 0 0 4px; }
  .tl-tabs button:last-child { border-radius: 0 4px 4px 0; }
  .tl-tabs button:hover { background: #e0e0e0; }
  .tl-tabs button.active { background: white; color: #333; border-bottom-color: #4363d8; }
  .tl-title { font: 600 12px/1.5 sans-serif; color: #333; }
  .tl-close { cursor: pointer; font-size: 16px; color: #888; border: none; background: none; }
  .tl-close:hover { color: #333; }
  .tl-body { flex: 1; min-height: 0; position: relative; padding: 4px 12px 8px; }
  .tl-chart-container { position: absolute; top: 4px; left: 12px; right: 12px; bottom: 8px; display: none; }
  .tl-chart-container.active { display: block; }
  /* Ride profile leaves room on the right for the live readout legend. */
  #tl-ride { right: 168px; }
  .tl-empty { color: #999; font: italic 13px/2 sans-serif; text-align: center; padding-top: 40px; }
  /* Live readout legend (replaces the in-canvas legend; never overlaps the plot). */
  #ride-legend {
    position: absolute; top: 6px; right: 10px; bottom: 8px; width: 150px;
    overflow-y: auto; font: 11px/1.4 sans-serif; color: #333;
  }
  #ride-legend .rl-km { font-weight: 700; color: #e6194b; margin-bottom: 4px; }
  #ride-legend .rl-row {
    display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 1px 0;
  }
  #ride-legend .rl-row:hover { background: #f0f0f0; }
  #ride-legend .rl-row.rl-off { opacity: 0.4; }
  #ride-legend .rl-sw { flex: 0 0 10px; height: 10px; border-radius: 2px; }
  #ride-legend .rl-name { flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #ride-legend .rl-val { flex: 0 0 auto; font-variant-numeric: tabular-nums; color: #555; }
</style>
</head>
<body>
<div id="map"></div>
<div id="legend"></div>
<div id="toolbar">
  <button class="nav-btn" id="version-prev" title="Previous version (Left arrow)">&#9664;</button>
  <label>Version: <select id="version-select"></select></label>
  <button class="nav-btn" id="version-next" title="Next version (Right arrow)">&#9654;</button>
</div>
<div id="version-flash"></div>
<div id="layer-panel">
  <div class="lp-header">
    <span>Layers</span>
    <button class="lp-collapse" id="lp-collapse-btn" title="Collapse">&times;</button>
  </div>
  <div class="lp-tabs" id="lp-tabs"></div>
  <div class="lp-body" id="lp-body"></div>
  <div class="lp-persistent" id="lp-persistent"></div>
</div>
<button id="layer-panel-toggle" title="Show layers">&#9776;</button>
<div id="sidebar">
  <span class="close-btn" id="sidebar-close">&times;</span>
  <div id="sidebar-content"></div>
</div>
<button id="timeline-toggle">&#9650; Ride profile</button>
<div id="timeline-panel">
  <div class="tl-header">
    <div class="tl-title" id="tl-title">Ride profile — species density along the route</div>
    <button class="tl-close" id="tl-close" title="Close ride profile">&times;</button>
  </div>
  <div class="tl-body" id="tl-body">
    <div class="tl-chart-container active" id="tl-ride"><canvas id="chart-ride"></canvas></div>
    <div id="ride-legend"></div>
    <div class="tl-empty" id="tl-ride-empty" style="display:none">No ride path. Run ride-experience first.</div>
  </div>
</div>
<script>
(function () {
  var worldExtent = {{ world_extent }};
  var maxZoom = {{ max_zoom }};
  var defaultVersion = {{ current_version }};

  // ── Coordinate mapping ─────────────────────────────────────
  // L.CRS.Simple transforms y' = -y, so positive lat values produce
  // negative pixel coords. The standard pattern: use negative latitudes.
  // Map bounds: lng [0, 256], lat [-256, 0].
  //   lat = 0   → top (north)   → pixel y = 0
  //   lat = -256 → bottom (south) → pixel y = 256
  // This makes Leaflet's tile grid align with our server (tms: true).
  var mapSize = 256;
  var scale = mapSize / worldExtent;  // map units per meter

  function metersToMap(x, y) {
    return L.latLng(y * scale - mapSize, x * scale);
  }
  function mapToMeters(latlng) {
    return { x: latlng.lng / scale, y: (latlng.lat + mapSize) / scale };
  }

  // ── URL hash state ─────────────────────────────────────────

  function parseHash() {
    var params = {};
    var hash = location.hash.replace(/^#/, "");
    if (!hash) return params;
    hash.split("&").forEach(function (part) {
      var kv = part.split("=");
      if (kv.length === 2) params[kv[0]] = kv[1];
    });
    return params;
  }

  function updateHash(params) {
    var parts = [];
    for (var k in params) {
      parts.push(k + "=" + params[k]);
    }
    history.replaceState(null, "", "#" + parts.join("&"));
  }

  var hashState = parseHash();
  var version = hashState.version !== undefined ? parseInt(hashState.version, 10) : defaultVersion;

  // ── Map setup ──────────────────────────────────────────────

  var bounds = L.latLngBounds(L.latLng(-mapSize, 0), L.latLng(0, mapSize));

  var map = L.map("map", {
    crs: L.CRS.Simple,
    minZoom: 0,
    maxZoom: maxZoom,
    maxBounds: bounds.pad(0.1)
  });

  // Custom panes so geology always renders below overlays.
  map.createPane("basePane").style.zIndex = 200;
  map.createPane("overlayPane").style.zIndex = 400;

  if (hashState.lat && hashState.lng && hashState.z) {
    map.setView(
      L.latLng(parseFloat(hashState.lat), parseFloat(hashState.lng)),
      parseInt(hashState.z, 10)
    );
  } else {
    map.fitBounds(bounds);
  }

  map.on("moveend", function () {
    var c = map.getCenter();
    var h = parseHash();
    h.version = version;
    h.z = map.getZoom();
    h.lat = c.lat.toFixed(2);
    h.lng = c.lng.toFixed(2);
    updateHash(h);
  });

  // ── Sidebar ────────────────────────────────────────────────

  var sidebar = document.getElementById("sidebar");
  var sidebarContent = document.getElementById("sidebar-content");
  var mapEl = document.getElementById("map");
  var clickMarker = null;
  var selectedPoint = null;  // {latlng, meters: {x, y}} — persists across version changes

  function openSidebar(html) {
    sidebarContent.innerHTML = html;
    sidebar.classList.add("open");
    mapEl.classList.add("sidebar-open");
    map.invalidateSize();
  }

  function closeSidebar() {
    sidebar.classList.remove("open");
    mapEl.classList.remove("sidebar-open");
    map.invalidateSize();
    if (clickMarker) { map.removeLayer(clickMarker); clickMarker = null; }
    selectedPoint = null;
  }

  document.getElementById("sidebar-close").addEventListener("click", closeSidebar);

  function formatValue(v) {
    if (typeof v === "number") return v.toFixed(4);
    return String(v);
  }

  function renderPointData(data) {
    var rasters = data.rasters || {};
    var html = "<table>";
    function row(label, key, unit) {
      var v = rasters[key];
      if (v === undefined) return;
      html += "<tr><td>" + label + "</td><td>" + v.toFixed(1) +
        (unit ? " " + unit : "") + "</td></tr>";
    }
    row("Altitude", "geology/heightmap", "m");
    row("Temperature", "climate_hydrology/temperature", "\u00b0C");
    row("Precipitation", "climate_hydrology/precipitation", "mm/yr");
    html += "</table>";

    // Species live in the ride-profile readout, so the inspector only adds
    // distinguished individuals here.
    html += "<h3>Individuals</h3>";
    var individuals = data.individuals || [];
    if (individuals.length === 0) {
      html += '<p class="empty">None nearby</p>';
    } else {
      html += "<table>";
      individuals.forEach(function (ind) {
        html += "<tr><td>" + ind.individual_id + "</td><td>" + ind.species_id + "</td></tr>";
      });
      html += "</table>";
    }

    return html;
  }

  // Click handler: convert map coords to meters for the API.
  map.on("click", function (e) {
    var m = mapToMeters(e.latlng);
    selectPoint(e.latlng, m);
  });

  function selectPoint(latlng, meters) {
    selectedPoint = { latlng: latlng, meters: meters };

    if (clickMarker) { map.removeLayer(clickMarker); }
    clickMarker = L.circleMarker(latlng, { radius: 6, color: "#ff3333", weight: 2 }).addTo(map);

    fetch("/api/world/" + version + "/point?x=" + meters.x + "&y=" + meters.y)
      .then(function (r) { return r.json(); })
      .then(function (data) { openSidebar(renderPointData(data)); });
  }

  function refreshSelectedPoint() {
    if (selectedPoint) {
      selectPoint(selectedPoint.latlng, selectedPoint.meters);
    }
  }

  // ── Individual markers ─────────────────────────────────────

  var individualLayer = L.layerGroup().addTo(map);
  var speciesColors = [
    "#e6194b", "#3cb44b", "#ffe119", "#4363d8", "#f58231",
    "#911eb4", "#42d4f4", "#f032e6", "#bfef45", "#fabed4",
    "#469990", "#dcbeff"
  ];
  var speciesColorMap = {};
  var colorIndex = 0;

  function getSpeciesColor(speciesId) {
    if (!speciesColorMap[speciesId]) {
      speciesColorMap[speciesId] = speciesColors[colorIndex % speciesColors.length];
      colorIndex++;
    }
    return speciesColorMap[speciesId];
  }

  function renderIndividualDetail(data) {
    var html = "<h3>Individual: " + data.individual_id + "</h3><table>";
    html += "<tr><td>Species</td><td>" + data.species_id + "</td></tr>";
    html += "<tr><td>Position</td><td>" + data.x.toFixed(1) + ", " + data.y.toFixed(1) + "</td></tr>";
    html += "<tr><td>Appeared</td><td>yr " + data.appeared_year.toFixed(0) + "</td></tr>";
    html += "<tr><td>Age</td><td>" + data.age.toFixed(0) + " years</td></tr>";
    html += "<tr><td>Status</td><td>" + (data.alive ? "alive" : "dead (yr " + (data.died_year || "?") + ")") + "</td></tr>";
    html += "</table>";

    if (data.species_genome) {
      html += "<h3>Species genome</h3><table>";
      for (var trait in data.species_genome) {
        html += "<tr><td>" + trait + "</td><td>" + formatValue(data.species_genome[trait]) + "</td></tr>";
      }
      html += "</table>";
    }
    return html;
  }

  function loadIndividuals() {
    var b = map.getBounds();
    var sw = mapToMeters(b.getSouthWest());
    var ne = mapToMeters(b.getNorthEast());
    var x_min = Math.max(0, sw.x);
    var y_min = Math.max(0, sw.y);
    var x_max = Math.min(worldExtent, ne.x);
    var y_max = Math.min(worldExtent, ne.y);

    fetch("/api/world/" + version + "/individuals?x_min=" + x_min + "&y_min=" + y_min +
          "&x_max=" + x_max + "&y_max=" + y_max)
      .then(function (r) { return r.json(); })
      .then(function (individuals) {
        individualLayer.clearLayers();
        individuals.forEach(function (ind) {
          var color = getSpeciesColor(ind.species_id);
          var marker = L.circleMarker(metersToMap(ind.x, ind.y), {
            radius: 5, color: color, fillColor: color, fillOpacity: 0.7, weight: 1
          });
          marker.bindTooltip(ind.individual_id, { direction: "top", offset: [0, -6] });
          marker.on("click", function (e) {
            L.DomEvent.stopPropagation(e);
            fetch("/api/world/" + version + "/individual/" + ind.individual_id)
              .then(function (r) { return r.json(); })
              .then(function (detail) { openSidebar(renderIndividualDetail(detail)); });
          });
          individualLayer.addLayer(marker);
        });
      });
  }

  map.on("moveend", loadIndividuals);
  loadIndividuals();

  // ── Ride path overlay ──────────────────────────────────────
  // The canonical ride is a polyline plus a ±50 m strip ribbon (the
  // sampling width, ≈ the rider's immediate visual range). The path is
  // stable across versions, so it's loaded once.

  var STRIP_HALF_M = 50.0;  // matches SAMPLE_BAR_HALF_M in ride_experience.py
  var rideLayer = L.layerGroup();
  var ridePathMeters = null;   // [{x, y}] world coords
  var rideCumDist = null;      // cumulative distance (m) at each path vertex
  var rideTotalDist = 0;       // total path length (m)
  var ridePathLoaded = false;

  function cellToMeters(rc) {
    // rc = [row, col]; cell centers at col*50+25, row*50+25
    return { x: rc[1] * 50 + 25, y: rc[0] * 50 + 25 };
  }

  function buildRibbon(pts) {
    // Offset each point ±STRIP_HALF_M perpendicular to local heading,
    // returning a closed polygon ring (left side forward, right side back).
    var left = [], right = [];
    for (var i = 0; i < pts.length; i++) {
      var a = pts[Math.max(0, i - 1)];
      var b = pts[Math.min(pts.length - 1, i + 1)];
      var dx = b.x - a.x, dy = b.y - a.y;
      var len = Math.sqrt(dx * dx + dy * dy) || 1;
      var px = -dy / len, py = dx / len;  // unit perpendicular
      left.push(metersToMap(pts[i].x + px * STRIP_HALF_M, pts[i].y + py * STRIP_HALF_M));
      right.push(metersToMap(pts[i].x - px * STRIP_HALF_M, pts[i].y - py * STRIP_HALF_M));
    }
    return left.concat(right.reverse());
  }

  function loadRidePath() {
    if (ridePathLoaded) return;
    fetch("/api/ride/path")
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (path) {
        if (!path || path.length === 0) return;
        ridePathMeters = path.map(cellToMeters);
        // Cumulative distance along the path (meters) for distance↔position mapping.
        rideCumDist = new Array(ridePathMeters.length);
        rideCumDist[0] = 0;
        for (var k = 1; k < ridePathMeters.length; k++) {
          var ddx = ridePathMeters[k].x - ridePathMeters[k - 1].x;
          var ddy = ridePathMeters[k].y - ridePathMeters[k - 1].y;
          rideCumDist[k] = rideCumDist[k - 1] + Math.sqrt(ddx * ddx + ddy * ddy);
        }
        rideTotalDist = rideCumDist[rideCumDist.length - 1];
        var centerline = ridePathMeters.map(function (p) { return metersToMap(p.x, p.y); });
        L.polygon(buildRibbon(ridePathMeters), {
          color: "#ffffff", weight: 0, fillColor: "#ffcc33", fillOpacity: 0.18,
          interactive: false
        }).addTo(rideLayer);
        L.polyline(centerline, {
          color: "#222", weight: 2, opacity: 0.85, interactive: false
        }).addTo(rideLayer);
        ridePathLoaded = true;
      });
  }

  rideLayer.addTo(map);
  loadRidePath();

  // ── Ride cursor (links the profile graph to the map path) ──────

  var cursorLayer = L.layerGroup().addTo(map);
  var rideCursorMarker = null;

  function positionAtDistance(distM) {
    if (!rideCumDist || rideCumDist.length === 0) return null;
    distM = Math.max(0, Math.min(rideTotalDist, distM));
    // Linear scan (path has ~thousands of points; fine for hover use).
    var i = 1;
    while (i < rideCumDist.length && rideCumDist[i] < distM) i++;
    if (i >= rideCumDist.length) i = rideCumDist.length - 1;
    var d0 = rideCumDist[i - 1], d1 = rideCumDist[i];
    var t = d1 > d0 ? (distM - d0) / (d1 - d0) : 0;
    var a = ridePathMeters[i - 1], b = ridePathMeters[i];
    return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
  }

  function nearestPathDistance(meters) {
    // Nearest path vertex to a world point; returns {distM, gapM} or null.
    if (!ridePathMeters) return null;
    var best = -1, bestD2 = Infinity;
    for (var i = 0; i < ridePathMeters.length; i++) {
      var dx = ridePathMeters[i].x - meters.x;
      var dy = ridePathMeters[i].y - meters.y;
      var d2 = dx * dx + dy * dy;
      if (d2 < bestD2) { bestD2 = d2; best = i; }
    }
    if (best < 0) return null;
    return { distM: rideCumDist[best], gapM: Math.sqrt(bestD2) };
  }

  function setRideCursor(distM) {
    var pos = positionAtDistance(distM);
    if (!pos) return;
    var latlng = metersToMap(pos.x, pos.y);
    if (rideCursorMarker) {
      rideCursorMarker.setLatLng(latlng);
    } else {
      rideCursorMarker = L.circleMarker(latlng, {
        radius: 7, color: "#fff", weight: 2, fillColor: "#e6194b",
        fillOpacity: 1, interactive: false
      }).addTo(cursorLayer);
    }
    setChartCursorLine(distM / 1000.0);
  }

  function clearRideCursor() {
    if (rideCursorMarker) { cursorLayer.removeLayer(rideCursorMarker); rideCursorMarker = null; }
    setChartCursorLine(null);
  }

  // Click near the ride path → place the cursor there (opens the profile).
  map.on("click", function (e) {
    if (!ridePathMeters) return;
    var near = nearestPathDistance(mapToMeters(e.latlng));
    if (near && near.gapM <= 500) {
      if (!tlOpen) toggleTimeline(true);
      setRideCursor(near.distM);
    }
  });

  // ── Layer controls ─────────────────────────────────────────

  var activeTileLayers = {};  // key → L.tileLayer

  function makeTileLayer(tier, layer, isOverlay) {
    // Species tiles carry per-pixel alpha (density), so they don't need
    // extra layer-level dimming — keep them near-opaque for legibility.
    var isSpecies = /^species_.*_density$/.test(layer);
    var op = isSpecies ? 0.95 : (isOverlay ? 0.6 : 1.0);
    return L.tileLayer(
      "/api/world/" + version + "/tiles/" + tier + "/" + layer + "/{z}/{x}/{y}.png",
      { tileSize: 256, bounds: bounds, minZoom: 0, maxZoom: maxZoom, noWrap: true,
        opacity: op, pane: isOverlay ? "overlayPane" : "basePane" }
    );
  }

  // ── Legend ──────────────────────────────────────────────────

  var legendEl = document.getElementById("legend");
  var legendEntries = {};  // layer key → DOM element

  // CSS gradients matching the LUTs in tiles.py.
  var colormapGradients = {
    terrain: "linear-gradient(to right, rgb(20,60,120), rgb(50,120,60), rgb(80,160,50), rgb(160,140,80), rgb(180,160,140), rgb(240,240,240))",
    viridis: "linear-gradient(to right, rgb(68,1,84), rgb(59,82,139), rgb(33,145,140), rgb(94,201,98), rgb(253,231,37))",
    blues: "linear-gradient(to right, rgb(240,240,255), rgb(100,140,210), rgb(10,30,100))",
    greens: "linear-gradient(to right, rgb(240,250,230), rgb(80,180,60), rgb(10,80,20))"
  };

  function addLegendEntry(key, tier, layer) {
    if (legendEntries[key]) return;  // already showing
    fetch("/api/world/" + version + "/layer_info/" + tier + "/" + layer)
      .then(function (r) { return r.json(); })
      .then(function (info) {
        if (info.colormap === "categorical") return;  // skip categorical
        var grad;
        if (info.colormap === "species" && info.color) {
          var c = info.color;
          grad = "linear-gradient(to right, rgba(" + c[0] + "," + c[1] + "," + c[2] + ",0), rgb(" + c[0] + "," + c[1] + "," + c[2] + "))";
        } else {
          grad = colormapGradients[info.colormap] || colormapGradients.viridis;
        }
        var div = document.createElement("div");
        div.className = "legend-entry";
        div.innerHTML =
          '<div class="legend-label">' + layer.replace(/_/g, " ") + (info.units ? ' <span style="font-weight:normal;color:#888">(' + info.units + ')</span>' : '') + '</div>' +
          '<div class="legend-bar" style="background:' + grad + '"></div>' +
          '<div class="legend-range"><span>' + info.vmin.toFixed(1) + '</span><span>' + info.vmax.toFixed(1) + '</span></div>';
        legendEl.appendChild(div);
        legendEntries[key] = div;
        legendEl.classList.add("visible");
      });
  }

  function removeLegendEntry(key) {
    if (legendEntries[key]) {
      legendEl.removeChild(legendEntries[key]);
      delete legendEntries[key];
      if (Object.keys(legendEntries).length === 0) {
        legendEl.classList.remove("visible");
      }
    }
  }

  function clearAllLegends() {
    for (var key in legendEntries) {
      legendEl.removeChild(legendEntries[key]);
    }
    legendEntries = {};
    legendEl.classList.remove("visible");
  }

  // ── Layer panel ────────────────────────────────────────────

  var layerPanel = document.getElementById("layer-panel");
  var lpTabsEl = document.getElementById("lp-tabs");
  var lpBodyEl = document.getElementById("lp-body");
  var lpPersistent = document.getElementById("lp-persistent");
  var lpCollapseBtn = document.getElementById("lp-collapse-btn");
  var lpToggleBtn = document.getElementById("layer-panel-toggle");

  lpCollapseBtn.addEventListener("click", function () {
    layerPanel.style.display = "none";
    lpToggleBtn.style.display = "block";
  });

  lpToggleBtn.addEventListener("click", function () {
    layerPanel.style.display = "flex";
    lpToggleBtn.style.display = "none";
  });

  // Categorize a layer into a tab (or null to skip).
  function categorizeLayer(tier, name) {
    if (tier === "geology") return "Terrain";
    if (tier === "climate_hydrology") return "Climate";
    if (tier === "ride") return "Ride";
    if (tier === "ecology") {
      if (name.match(/^species_.*_density$/)) return "Species";
      return "Ecology";
    }
    return "Ecology";  // fallback
  }

  // Display name for a layer.
  function layerDisplayName(tier, name) {
    if (name.match(/^species_.*_density$/)) {
      return name.replace(/^species_/, "").replace(/_density$/, "").replace(/_/g, " ");
    }
    return name.replace(/_/g, " ");
  }

  var tabOrder = ["Terrain", "Climate", "Ecology", "Species", "Ride"];
  var activeTab = tabOrder[0];  // Track which tab is selected

  // Track which layer keys the user has toggled on, so flipbook preserves them.
  var userLayerSelection = null;  // null = use defaults; Set = explicit choices

  function buildLayers() {
    // Snapshot current selections before clearing, if any layers are active.
    if (Object.keys(activeTileLayers).length > 0) {
      userLayerSelection = new Set(Object.keys(activeTileLayers));
    }

    // Remove all existing tile layers from the map.
    for (var key in activeTileLayers) {
      map.removeLayer(activeTileLayers[key]);
    }
    activeTileLayers = {};
    clearAllLegends();

    // Clear panel contents.
    lpTabsEl.innerHTML = "";
    lpBodyEl.innerHTML = "";
    lpPersistent.innerHTML = "";

    fetch("/api/world/" + version + "/metadata")
      .then(function (r) { return r.json(); })
      .then(function (meta) {
        // Bucket layers into tabs.
        var tabs = {};
        tabOrder.forEach(function (t) { tabs[t] = []; });

        var layers = meta.layers;
        for (var tier in layers) {
          var names = layers[tier];
          for (var i = 0; i < names.length; i++) {
            var name = names[i];
            var tab = categorizeLayer(tier, name);
            if (!tab) continue;
            tabs[tab].push({ tier: tier, name: name, key: tier + "/" + name });
          }
        }

        // Sort species by display name.
        tabs.Species.sort(function (a, b) {
          return layerDisplayName(a.tier, a.name).localeCompare(layerDisplayName(b.tier, b.name));
        });

        // Build tab buttons and content panes.
        var tabContents = {};
        tabOrder.forEach(function (tabName, idx) {
          // Tab button.
          var btn = document.createElement("button");
          btn.textContent = tabName;
          btn.dataset.tab = tabName;
          if (tabName === activeTab) btn.className = "active";
          btn.addEventListener("click", function () {
            lpTabsEl.querySelectorAll("button").forEach(function (b) { b.classList.remove("active"); });
            btn.classList.add("active");
            activeTab = tabName;
            lpBodyEl.querySelectorAll(".lp-tab-content").forEach(function (c) { c.classList.remove("active"); });
            tabContents[tabName].classList.add("active");
          });
          lpTabsEl.appendChild(btn);

          // Content pane.
          var pane = document.createElement("div");
          pane.className = "lp-tab-content" + (tabName === activeTab ? " active" : "");
          tabContents[tabName] = pane;

          var items = tabs[tabName];
          if (items.length === 0) {
            var em = document.createElement("em");
            em.style.color = "#999";
            em.textContent = "No layers";
            pane.appendChild(em);
          } else {
            items.forEach(function (item) {
              var lbl = document.createElement("label");
              var cb = document.createElement("input");
              cb.type = "checkbox";
              cb.dataset.key = item.key;
              cb.dataset.tier = item.tier;
              cb.dataset.layer = item.name;

              // Restore previous selection, or default to heightmap.
              var shouldBeOn = userLayerSelection
                ? userLayerSelection.has(item.key)
                : (item.name === "heightmap");
              if (shouldBeOn) {
                cb.checked = true;
                var tl = makeTileLayer(item.tier, item.name, item.tier !== "geology");
                tl.addTo(map);
                activeTileLayers[item.key] = tl;
                addLegendEntry(item.key, item.tier, item.name);
              }

              cb.addEventListener("change", function () {
                var k = this.dataset.key;
                var t = this.dataset.tier;
                var ln = this.dataset.layer;
                if (this.checked) {
                  var layer = makeTileLayer(t, ln, t !== "geology");
                  layer.addTo(map);
                  activeTileLayers[k] = layer;
                  addLegendEntry(k, t, ln);
                } else {
                  if (activeTileLayers[k]) {
                    map.removeLayer(activeTileLayers[k]);
                    delete activeTileLayers[k];
                  }
                  removeLegendEntry(k);
                }
              });

              lbl.appendChild(cb);
              lbl.appendChild(document.createTextNode(layerDisplayName(item.tier, item.name)));
              pane.appendChild(lbl);
            });
          }

          lpBodyEl.appendChild(pane);
        });

        // Persistent section: individuals toggle.
        var indLabel = document.createElement("label");
        var indCb = document.createElement("input");
        indCb.type = "checkbox";
        indCb.checked = map.hasLayer(individualLayer);
        indCb.addEventListener("change", function () {
          if (this.checked) {
            individualLayer.addTo(map);
          } else {
            map.removeLayer(individualLayer);
          }
        });
        indLabel.appendChild(indCb);
        indLabel.appendChild(document.createTextNode("Individuals"));
        lpPersistent.appendChild(indLabel);

        // Ride path toggle.
        var rideLabel = document.createElement("label");
        var rideCb = document.createElement("input");
        rideCb.type = "checkbox";
        rideCb.checked = map.hasLayer(rideLayer);
        rideCb.addEventListener("change", function () {
          if (this.checked) {
            loadRidePath();
            rideLayer.addTo(map);
          } else {
            map.removeLayer(rideLayer);
          }
        });
        rideLabel.appendChild(rideCb);
        rideLabel.appendChild(document.createTextNode("Ride path"));
        lpPersistent.appendChild(rideLabel);
      });
  }

  buildLayers();

  // ── Version picker ─────────────────────────────────────────

  var versionSelect = document.getElementById("version-select");

  fetch("/api/versions")
    .then(function (r) { return r.json(); })
    .then(function (versions) {
      versions.forEach(function (v) {
        var opt = document.createElement("option");
        opt.value = v.version_id;
        var yr = "";
        if (v.tier_clocks && v.tier_clocks.ecology) {
          yr = " (yr " + (v.tier_clocks.ecology.simulated_year || 0).toFixed(0) + ")";
        }
        opt.textContent = "v" + v.version_id + yr + " — " + v.trigger;
        if (v.version_id === version) opt.selected = true;
        versionSelect.appendChild(opt);
      });
    });

  versionSelect.addEventListener("change", function () {
    version = parseInt(versionSelect.value, 10);
    var h = parseHash();
    h.version = version;
    updateHash(h);
    buildLayers();
    loadIndividuals();
    refreshSelectedPoint();
  });

  window.addEventListener("hashchange", function () {
    var h = parseHash();
    if (h.version !== undefined) {
      var newVersion = parseInt(h.version, 10);
      if (newVersion !== version) {
        version = newVersion;
        versionSelect.value = version;
        buildLayers();
        loadIndividuals();
        refreshSelectedPoint();
      }
    }
  });

  // ── Flipbook navigation (prev/next version) ───────────────

  var prevBtn = document.getElementById("version-prev");
  var nextBtn = document.getElementById("version-next");
  var flashEl = document.getElementById("version-flash");
  var flashTimer = null;

  function flashVersion() {
    var opt = versionSelect.options[versionSelect.selectedIndex];
    flashEl.textContent = opt ? opt.textContent : "v" + version;
    flashEl.classList.add("show");
    clearTimeout(flashTimer);
    flashTimer = setTimeout(function () { flashEl.classList.remove("show"); }, 900);
  }

  function stepVersion(delta) {
    var opts = versionSelect.options;
    if (opts.length === 0) return;
    var idx = versionSelect.selectedIndex + delta;
    if (idx < 0 || idx >= opts.length) return;
    versionSelect.selectedIndex = idx;
    versionSelect.dispatchEvent(new Event("change"));
    flashVersion();
  }

  function updateNavButtons() {
    var opts = versionSelect.options;
    prevBtn.disabled = (opts.length === 0 || versionSelect.selectedIndex <= 0);
    nextBtn.disabled = (opts.length === 0 || versionSelect.selectedIndex >= opts.length - 1);
  }

  prevBtn.addEventListener("click", function () { stepVersion(-1); });
  nextBtn.addEventListener("click", function () { stepVersion(1); });

  // Update button state whenever version changes.
  versionSelect.addEventListener("change", updateNavButtons);
  // Initial state (buttons disabled until versions load).
  updateNavButtons();

  document.addEventListener("keydown", function (e) {
    // Don't capture when an input/select/textarea is focused.
    var tag = document.activeElement && document.activeElement.tagName;
    if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
    if (e.key === "ArrowLeft") { e.preventDefault(); stepVersion(-1); }
    else if (e.key === "ArrowRight") { e.preventDefault(); stepVersion(1); }
  });

  // ── Ride profile panel ────────────────────────────────────────
  // Species density along the ride path at the current version. Stepping
  // the version flipbook re-samples, so you watch the ride change as the
  // world ages.

  var tlPanel = document.getElementById("timeline-panel");
  var tlToggle = document.getElementById("timeline-toggle");
  var tlClose = document.getElementById("tl-close");
  var rideEmpty = document.getElementById("tl-ride-empty");
  var tlOpen = false;

  var chartRide = null;
  var rideProfileData = null;     // last loaded profile (used by Phase 4 linking)
  var rideProfileVersion = null;

  function toggleTimeline(show) {
    tlOpen = (show !== undefined) ? show : !tlOpen;
    if (tlOpen) {
      tlPanel.classList.add("open");
      tlToggle.classList.add("panel-open");
      mapEl.style.bottom = "250px";
      legendEl.style.bottom = "270px";
      tlToggle.innerHTML = "&#9660; Ride profile";
      if (rideProfileVersion !== version || !rideProfileData) loadRideProfile();
    } else {
      tlPanel.classList.remove("open");
      tlToggle.classList.remove("panel-open");
      mapEl.style.bottom = "0";
      legendEl.style.bottom = "20px";
      tlToggle.innerHTML = "&#9650; Ride profile";
    }
    map.invalidateSize();
  }

  tlToggle.addEventListener("click", function () { toggleTimeline(); });
  tlClose.addEventListener("click", function () { toggleTimeline(false); });

  function rgbStr(c) { return "rgb(" + c[0] + "," + c[1] + "," + c[2] + ")"; }
  function rgbaStr(c, a) { return "rgba(" + c[0] + "," + c[1] + "," + c[2] + "," + a + ")"; }

  function showRideEmpty(msg) {
    rideProfileData = null;
    var canvas = document.getElementById("chart-ride");
    if (chartRide) { chartRide.destroy(); chartRide = null; }
    canvas.style.display = "none";
    var legendEl = document.getElementById("ride-legend");
    if (legendEl) legendEl.innerHTML = "";
    rideKmEl = null;
    rideEmpty.style.display = "block";
    rideEmpty.textContent = msg;
  }

  // The readout lives in an HTML panel to the right of the plot (never over
  // the data). buildRideLegend draws the rows; rideTooltipExternal fills in
  // live values as you hover.
  var rideValueSpans = {};   // datasetIndex → value <span>
  var rideKmEl = null;

  function buildRideLegend(datasets) {
    var legendEl = document.getElementById("ride-legend");
    legendEl.innerHTML = "";
    rideValueSpans = {};

    rideKmEl = document.createElement("div");
    rideKmEl.className = "rl-km";
    rideKmEl.textContent = "—";
    legendEl.appendChild(rideKmEl);

    datasets.forEach(function (ds, idx) {
      var row = document.createElement("div");
      row.className = "rl-row";
      var sw = document.createElement("span");
      sw.className = "rl-sw";
      sw.style.background = ds.borderColor;
      var name = document.createElement("span");
      name.className = "rl-name";
      name.textContent = ds.label;
      name.title = ds.label;
      var val = document.createElement("span");
      val.className = "rl-val";
      row.appendChild(sw);
      row.appendChild(name);
      row.appendChild(val);
      row.onclick = function () {
        var vis = chartRide.isDatasetVisible(idx);
        chartRide.setDatasetVisibility(idx, !vis);
        chartRide.update();
        row.classList.toggle("rl-off", vis);
      };
      legendEl.appendChild(row);
      rideValueSpans[idx] = val;
    });
  }

  function rideTooltipExternal(context) {
    var tt = context.tooltip;
    if (rideKmEl === null) return;
    function clear() {
      rideKmEl.textContent = "—";
      Object.keys(rideValueSpans).forEach(function (k) { rideValueSpans[k].textContent = ""; });
    }
    if (!tt || tt.opacity === 0 || !tt.dataPoints || tt.dataPoints.length === 0) {
      clear();
      return;
    }
    rideKmEl.textContent = "km " + tt.dataPoints[0].parsed.x.toFixed(1);
    Object.keys(rideValueSpans).forEach(function (k) { rideValueSpans[k].textContent = ""; });
    tt.dataPoints.forEach(function (dp) {
      var s = rideValueSpans[dp.datasetIndex];
      if (s) s.textContent = dp.parsed.y.toFixed(2);
    });
  }

  function buildRideChart(data) {
    var species = (data && data.species) || {};
    var sids = Object.keys(species);
    if (sids.length === 0) {
      showRideEmpty("No species visible along the ride at this version.");
      return;
    }
    var canvas = document.getElementById("chart-ride");
    canvas.style.display = "block";
    rideEmpty.style.display = "none";
    if (chartRide) { chartRide.destroy(); chartRide = null; }

    var distKm = data.distances.map(function (d) { return d / 1000.0; });
    var colors = data.colors || {};
    // Most abundant first (legend order)
    sids.sort(function (a, b) {
      function sum(s) { return species[s].reduce(function (x, y) { return x + y; }, 0); }
      return sum(b) - sum(a);
    });
    var datasets = sids.map(function (sid) {
      var c = colors[sid] || [120, 120, 120];
      return {
        label: sid.replace(/^anc_\d+_/, ""),
        data: species[sid].map(function (d, i) { return { x: distKm[i], y: d }; }),
        borderColor: rgbStr(c),
        backgroundColor: rgbaStr(c, 0.15),
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.2,
        fill: true
      };
    });

    var ctx = canvas.getContext("2d");
    chartRide = new Chart(ctx, {
      type: "line",
      data: { datasets: datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        parsing: false,
        normalized: true,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: false },  // replaced by the HTML readout legend on the right
          annotation: { annotations: {} },
          tooltip: { enabled: false, external: rideTooltipExternal }
        },
        scales: {
          x: { type: "linear", title: { display: true, text: "Distance along ride (km)", font: { size: 11 } }, ticks: { font: { size: 10 } } },
          y: { title: { display: true, text: "Density (strip mean)", font: { size: 11 } }, ticks: { font: { size: 10 } }, beginAtZero: true }
        }
      }
    });

    buildRideLegend(datasets);

    // Hover the profile → move the cursor on the map path.
    canvas.onmousemove = function (e) {
      if (!chartRide || !rideCumDist) return;
      var rect = canvas.getBoundingClientRect();
      var km = chartRide.scales.x.getValueForPixel(e.clientX - rect.left);
      if (km === null || isNaN(km)) return;
      setRideCursor(km * 1000.0);
    };
    canvas.onmouseleave = function () { clearRideCursor(); };

    // Click the profile → inspect that world location, exactly as clicking
    // the corresponding point on the map (opens the inspection sidebar).
    canvas.onclick = function (e) {
      if (!chartRide || !rideCumDist) return;
      var rect = canvas.getBoundingClientRect();
      var km = chartRide.scales.x.getValueForPixel(e.clientX - rect.left);
      if (km === null || isNaN(km)) return;
      var distM = Math.max(0, Math.min(rideTotalDist, km * 1000.0));
      var pos = positionAtDistance(distM);
      if (!pos) return;
      setRideCursor(distM);
      selectPoint(metersToMap(pos.x, pos.y), { x: pos.x, y: pos.y });
    };
  }

  // Vertical cursor line on the profile, throttled to animation frames.
  var _cursorRaf = null, _pendingCursorKm;
  function setChartCursorLine(km) {
    if (!chartRide) return;
    _pendingCursorKm = km;
    if (_cursorRaf) return;
    _cursorRaf = requestAnimationFrame(function () {
      _cursorRaf = null;
      if (!chartRide) return;
      var ann = chartRide.options.plugins.annotation.annotations;
      if (_pendingCursorKm === null || _pendingCursorKm === undefined) {
        delete ann.cursor;
      } else {
        ann.cursor = {
          type: "line", xMin: _pendingCursorKm, xMax: _pendingCursorKm,
          borderColor: "#e6194b", borderWidth: 1.5
        };
      }
      chartRide.update("none");
    });
  }

  function loadRideProfile() {
    rideProfileVersion = version;
    var reqVersion = version;
    fetch("/api/world/" + reqVersion + "/ride_profile")
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); })
      .then(function (res) {
        if (reqVersion !== version) return;  // a newer request superseded this
        if (!res.ok || !res.body || res.body.error) {
          showRideEmpty((res.body && res.body.error) || "No ride path. Run ride-experience first.");
          return;
        }
        rideProfileData = res.body;
        buildRideChart(res.body);
      })
      .catch(function () { showRideEmpty("Failed to load ride profile."); });
  }

  // Re-sample the ride whenever the version changes (if the panel is open).
  versionSelect.addEventListener("change", function () {
    if (tlOpen) loadRideProfile();
  });

})();
</script>
</body>
</html>
